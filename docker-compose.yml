services:
  web:
    build: .
    container_name: django_app
    user: "1000:1000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    stdin_open: true
    tty: true

  streaming_api:
    build:
      context: .
      dockerfile: streaming_server/Dockerfile
    container_name: streaming_api
    user: "1000:1000"
    volumes:
      - ./streaming_server:/app
    ports:
      - "8002:8001"
    environment:
      - PYTHONUNBUFFERED=1

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: celery_worker
    user: "1000:1000"
    command: celery -A myproject worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web

  celery_beat:
    build: .
    container_name: celery_beat
    user: "1000:1000"
    command: celery -A myproject beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web
