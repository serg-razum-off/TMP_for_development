{% extends "base.html" %}

{% block title %}Delete Order - Umbrella Corp{% endblock %}

{% block content %}
    <h1>Delete Order</h1>
    <p>Are you sure you want to delete order "{{ object.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>
    <hr>
    <a href="{% url 'order_detail' object.pk %}">Cancel</a>
{% endblock %}
