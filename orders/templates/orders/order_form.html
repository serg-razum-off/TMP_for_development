{% extends "base.html" %}

{% block title %}{% if object %}Edit Order{% else %}Create Order{% endif %} - Umbrella Corp{% endblock %}

{% block content %}
    <h1>{% if object %}Edit Order{% else %}Create Order{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <hr>
    <a href="{% url 'order_list' %}">Cancel</a>
{% endblock %}
