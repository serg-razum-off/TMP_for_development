<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>
    <h1>Orders</h1>
    
    <div>
        <a href="{% url 'order_create' %}">Create New Order</a>
    </div>

    <form method="get" style="margin: 20px 0;">
        <label for="start_date">Start Date:</label>
        <input type="date" name="start_date" id="start_date" value="{{ request.GET.start_date }}">
        
        <label for="end_date">End Date:</label>
        <input type="date" name="end_date" id="end_date" value="{{ request.GET.end_date }}">
        
        <button type="submit">Filter</button>
        <a href="{% url 'order_list' %}">Clear</a>
    </form>

    <p>List of orders:</p>
    <ul>
        {% for order in orders %}
            <li>
                <strong>{{ order.title }}</strong> - {{ order.amount }}$ - User: {{ order.user.username }}
                (<a href="{% url 'order_detail' order.pk %}">View</a> | 
                 <a href="{% url 'order_update' order.pk %}">Edit</a> | 
                 <a href="{% url 'order_delete' order.pk %}">Delete</a>)
            </li>
        {% empty %}
            <li>No orders found.</li>
        {% endfor %}
    </ul>
</body>
</html>
