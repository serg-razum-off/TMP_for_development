{% extends "base.html" %}

{% block title %}Login - Umbrella Corp{% endblock %}

{% block body_class %}login-page blurred-bg-page{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title-giant">Access Portal</h2>
</div>

<hr class="header-separator header-separator-bold">

<div class="content-card login-card" style="max-width: 400px; margin: 40px auto; padding: 40px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" style="width: 100%; border-radius: 4px; padding: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);" required>
        </div>
        <div class="form-group" style="margin-bottom: 30px;">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" style="width: 100%; border-radius: 4px; padding: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 600;">Authenticate</button>
    </form>
    
    {% if form.errors %}
        <div class="alert alert-danger" style="margin-top: 20px; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 10px; border-radius: 4px;">
            Invalid credentials. Access Denied.
        </div>
    {% endif %}
</div>

<style>
    .login-card {
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
    }
</style>
{% endblock %}
